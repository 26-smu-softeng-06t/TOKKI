name: "🔎 Spike / Research"
description: "기술 검토, 조사, 비교, 실험 결과를 기록합니다."
title: "[SPIKE] "
labels: ["research", "spike"]
assignees: []
body:
  - type: textarea
    id: question
    attributes:
      label: "조사 질문"
      placeholder: "예: MySQL과 PostgreSQL 중 이번 과제에 더 적합한 선택은 무엇인가?"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "배경"
      placeholder: "예: DBMS가 아직 미정이며 Sprint 0 내 결정 필요"

  - type: textarea
    id: criteria
    attributes:
      label: "비교 기준"
      placeholder: |
        - 팀 경험
        - 설치 난이도
        - JPA 호환성
        - 무료 사용성
        - 유지보수 편의성

  - type: textarea
    id: result
    attributes:
      label: "조사 결과"
      placeholder: "핵심 비교 결과를 작성"
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: "권장 결론"
      placeholder: "예: Sprint 0에서는 PostgreSQL 채택 권장"
    validations:
      required: true

  - type: textarea
    id: next_steps
    attributes:
      label: "후속 조치"
      placeholder: |
        - [ ] 팀 회의에서 결정
        - [ ] 환경 설정 문서 업데이트
        - [ ] DB 초기 스키마 작성