name: "Spike / Research"
description: "기술 검토, 조사, 실험 결과를 기록합니다."
title: "[SPIKE] "
labels: ["spike"]
assignees: []
body:
  - type: textarea
    id: question
    attributes:
      label: "조사 질문"
      placeholder: "예: 이번 프로젝트에서 PostgreSQL이 MySQL보다 적합한가?"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "배경"
      placeholder: "예: Sprint 내 DB 결정이 필요합니다."

  - type: textarea
    id: criteria
    attributes:
      label: "비교 기준"
      placeholder: |
        - 팀 경험
        - 설치 난이도
        - 프레임워크 호환성
        - 유지보수 편의성

  - type: textarea
    id: result
    attributes:
      label: "조사 결과"
      placeholder: "핵심 비교 결과를 간단히 정리해 주세요."
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: "권장 결론"
      placeholder: "예: 초기 개발 속도를 위해 PostgreSQL 채택 권장"
    validations:
      required: true

  - type: textarea
    id: next_steps
    attributes:
      label: "후속 조치"
      placeholder: |
        - [ ] 팀 회의에서 최종 결정
        - [ ] 설정 문서 업데이트
        - [ ] 초기 스키마 초안 작성
