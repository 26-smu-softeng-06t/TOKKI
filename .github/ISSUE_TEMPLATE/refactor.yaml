name: "Refactor / Tech Debt"
description: "리팩토링 및 기술부채 상환 작업을 등록합니다."
title: "[REFACTOR] "
labels: ["refactor", "tech-debt"]
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: "현재 문제"
      description: "유지보수/성능/가독성 관점에서 현재 어려움을 적어주세요."
      placeholder: "예: QuizPage에 상태와 UI 로직이 섞여 수정 시 영향 범위가 큽니다."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: "개선 방법"
      placeholder: "예: 로직을 custom hook으로 분리하고 계산 코드를 util로 이동합니다."
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: "기대 효과"
      placeholder: "예: 테스트 용이성 증가, 재사용성 향상, 버그 감소"

  - type: textarea
    id: risk
    attributes:
      label: "리스크 및 확인 사항"
      placeholder: "예: 동작 변경 방지를 위해 회귀 테스트가 필요합니다."

  - type: textarea
    id: checklist
    attributes:
      label: "작업 체크리스트"
      placeholder: |
        - [ ] 기존 구조 분석
        - [ ] 개선 설계
        - [ ] 코드 변경
        - [ ] 회귀 테스트
