name: "🐛 Bug Report"
description: "버그, 오류, 비정상 동작을 기록합니다."
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 형태로 작성해주세요.

  - type: textarea
    id: summary
    attributes:
      label: "버그 요약"
      description: "무슨 문제가 발생했는지 간단히 설명해주세요."
      placeholder: "예: 퀴즈 종료 후 결과 모달이 표시되지 않음"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "재현 절차"
      description: "버그를 다시 발생시키는 순서를 적어주세요."
      placeholder: |
        1. 로그인
        2. SelectPage에서 중 난이도 1단계 선택
        3. 10문제 풀이 완료
        4. 결과 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "기대 동작"
      placeholder: "예: 10문제 완료 후 QuizPageModal이 자동 표시되어야 함"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "실제 동작"
      placeholder: "예: 화면이 멈추고 결과 모달이 뜨지 않음"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "심각도"
      options:
        - Critical
        - Major
        - Minor
      default: 1
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - High
        - Medium
        - Low
      default: 1
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "환경"
      description: "브라우저, OS, 실행 환경 등을 적어주세요."
      placeholder: "Chrome 138 / Windows 11 / local frontend + local backend"

  - type: textarea
    id: logs
    attributes:
      label: "로그 / 스크린샷"
      description: "콘솔 에러, 서버 로그, 캡처 화면 등을 첨부해주세요."
      render: shell

  - type: textarea
    id: impact
    attributes:
      label: "영향 범위"
      description: "어떤 기능/사용자에게 영향이 있는지 적어주세요."
      placeholder: "예: 사용자 퀴즈 완료 플로우 전체에 영향"