name: "Bug Report"
description: "버그, 오류, 비정상 동작을 등록합니다."
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 형태로 작성해 주세요.
        이슈 생성 후 GitHub Project에서 상태를 관리합니다.

  - type: textarea
    id: summary
    attributes:
      label: "문제 요약"
      description: "무슨 문제가 발생했는지 한두 문장으로 적어주세요."
      placeholder: "예: 퀴즈 완료 후 결과 모달이 열리지 않습니다."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "재현 절차"
      description: "다른 팀원이 그대로 따라 할 수 있게 순서대로 작성해 주세요."
      placeholder: |
        1. 로그인
        2. SelectPage에서 중 난이도 1단계 선택
        3. 10문제 풀이 완료
        4. 결과 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "기대 동작"
      placeholder: "예: 10문제 완료 후 결과 모달이 자동 표시되어야 합니다."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "실제 동작"
      placeholder: "예: 화면이 멈추고 결과 모달이 표시되지 않습니다."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "심각도"
      description: "사용자 영향 기준으로 선택해 주세요."
      options:
        - 높음 (핵심 기능 사용 불가)
        - 보통 (우회 가능)
        - 낮음 (경미한 불편)
      default: 1
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      description: "처리 순서를 선택해 주세요."
      options:
        - 높음
        - 보통
        - 낮음
      default: 1
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "실행 환경"
      description: "브라우저, OS, 실행 환경 등을 적어주세요."
      placeholder: "Chrome 138 / Windows 11 / local frontend + local backend"

  - type: textarea
    id: logs
    attributes:
      label: "로그 또는 스크린샷"
      description: "콘솔 에러, 서버 로그, 화면 캡처를 첨부해 주세요."
      render: shell

  - type: textarea
    id: impact
    attributes:
      label: "영향 범위"
      description: "어떤 기능/사용자에게 영향이 있는지 적어주세요."
      placeholder: "예: 퀴즈 완료 사용자 전체"
