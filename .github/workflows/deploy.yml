name: Deploy TOKKI (Non-Docker)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend (Gradle)
        run: |
          cd backend
          gradle clean build -x test --no-daemon

      - name: Verify backend JAR
        run: |
          ls -lh backend/build/libs/*.jar

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend (Vite)
        run: |
          cd frontend
          npm run build

      - name: Verify frontend dist
        run: |
          ls -lh frontend/dist/

      - name: Transfer backend JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/opt/tokki/backend/"
          strip_components: 3
          overwrite: true

      - name: Transfer frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/dist/*"
          target: "/opt/tokki/frontend/dist/"
          strip_components: 2
          overwrite: true

      - name: Rename JAR and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/tokki/backend/logs
            mv /opt/tokki/backend/*.jar /opt/tokki/backend/app.jar

            if pm2 describe tokki-backend >/dev/null 2>&1; then
              pm2 restart tokki-backend --update-env
            else
              pm2 start "java -jar /opt/tokki/backend/app.jar --server.port=4000 --spring.profiles.active=prod --spring.config.additional-location=/opt/tokki/backend/application-prod.yml" --name tokki-backend
              pm2 save
            fi

            for i in $(seq 1 15); do
              status_code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/api/auth/me || true)
              if echo "$status_code" | grep -qE "200|401|403"; then
                echo "Backend healthy ($status_code)"
                exit 0
              fi
              echo "Waiting backend startup... ($i/15)"
              sleep 2
            done

            echo "Backend health check failed"
            pm2 logs tokki-backend --lines 80
            exit 1

      - name: Validate and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo nginx -t
            sudo systemctl reload nginx

