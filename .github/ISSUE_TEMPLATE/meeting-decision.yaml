name: "📣 Meeting / Decision Record"
description: "회의 내용과 의사결정을 기록합니다."
title: "[MEETING] "
labels: ["meeting", "decision"]
assignees: []
body:
  - type: input
    id: date
    attributes:
      label: "회의 일시"
      placeholder: "2026-04-11 20:00"
    validations:
      required: true

  - type: input
    id: attendees
    attributes:
      label: "참석자"
      placeholder: "홍길동, 김철수, 이영희"
    validations:
      required: true

  - type: textarea
    id: agenda
    attributes:
      label: "안건"
      placeholder: |
        1. Sprint 1 작업 분배
        2. DB 선택
        3. 관리자 인증코드 처리 방식
    validations:
      required: true

  - type: textarea
    id: decisions
    attributes:
      label: "결정 사항"
      placeholder: |
        - DB는 PostgreSQL 사용
        - 인증은 JWT 기반으로 진행
        - Admin 기능은 Sprint 1에 포함
    validations:
      required: true

  - type: textarea
    id: action_items
    attributes:
      label: "후속 액션"
      placeholder: |
        - [ ] README DB 설정 추가
        - [ ] auth API 초안 작성
        - [ ] GitHub Project에 작업 배치