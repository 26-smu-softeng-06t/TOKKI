name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-write-only: false

      - name: Verify and fix gradlew
        run: |
          cd backend
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️ gradle-wrapper.jar missing, regenerating..."
            # Install gradle temporarily to generate wrapper
            curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp
            /tmp/gradle-8.5/bin/gradle wrapper --gradle-version=8.5
          fi
          chmod +x gradlew

      - name: Run backend tests (if exist)
        run: |
          cd backend
          if [ -d "src/test" ] && [ "$(find src/test -name '*.java' | wc -l)" -gt 0 ]; then
            ./gradlew test --no-daemon --continue || true
          else
            echo "⚠️ No test files found, skipping tests"
          fi

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/test-results/test/
          retention-days: 7
          if-no-files: ignore

      - name: Build backend (JAR)
        run: |
          cd backend
          ./gradlew clean build -x test --no-daemon

      - name: Verify backend JAR exists
        run: |
          JAR_FILE="$(find backend/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No executable backend JAR found"
            exit 1
          fi
          echo "✅ JAR built: $JAR_FILE"
          ls -lh "$JAR_FILE"

  frontend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build frontend (production)
        run: |
          cd frontend
          npm run build

      - name: Verify frontend dist
        run: |
          if [ ! -f "frontend/dist/index.html" ]; then
            echo "❌ Frontend build failed: dist/index.html not found"
            exit 1
          fi
          echo "✅ Frontend built successfully"
          ls -lh frontend/dist/

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Check for common secret patterns
          if grep -rE "(FIREBASE_PRIVATE_KEY|serviceAccountKey|firebase-adminsdk|\.json\"" \
              --include="*.ts" --include="*.tsx" --include="*.java" \
              backend/src frontend/src . 2>/dev/null; then
            echo "⚠️ Possible secret found in source code"
            exit 1
          fi
          echo "✅ No obvious secrets detected"

      - name: Check .gitignore
        run: |
          required=(
            "*.env"
            "*.key"
            "*.pem"
            "*firebase-admin*.json"
            "serviceAccount*.json"
          )
          for pattern in "${required[@]}"; do
            if ! grep -q "$pattern" .gitignore; then
              echo "⚠️ .gitignore missing pattern: $pattern"
            fi
          done
          echo "✅ .gitignore check passed"
