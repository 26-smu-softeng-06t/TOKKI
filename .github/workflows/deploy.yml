name: Deploy to DigitalOcean

on:
  push:
    branches:
      - dev

# 동시 배포 방지
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. 소스 코드 체크아웃
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 2. 백엔드 빌드 (Spring Boot + Gradle)
      # ==========================================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build backend (Gradle)
        run: |
          cd backend
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean build -x test --no-daemon
          else
            echo "gradlew not found. Using system gradle."
            gradle clean build -x test --no-daemon
          fi

      - name: Verify backend JAR
        run: |
          ls -lh backend/build/libs/*.jar

      # ==========================================
      # 3. 프론트엔드 빌드 (React + Vite)
      # ==========================================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend (Vite)
        run: |
          cd frontend
          npm run build

      - name: Verify frontend dist
        run: |
          ls -lh frontend/dist/

      # ==========================================
      # 4. 서버로 파일 전송 (SCP)
      # ==========================================
      - name: Transfer backend JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/opt/tokki/backend/"
          strip_components: 3
          overwrite: true

      - name: Rename JAR to app.jar on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 빌드된 jar 파일을 app.jar로 이름 통일
            mv /opt/tokki/backend/*.jar /opt/tokki/backend/app.jar 2>/dev/null || true
            # 로그 디렉토리 확인
            mkdir -p /opt/tokki/backend/logs
            echo "JAR rename complete"
            ls -lh /opt/tokki/backend/app.jar

      - name: Transfer frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "frontend/dist/*"
          target: "/opt/tokki/frontend/dist/"
          strip_components: 2
          overwrite: true

      - name: Transfer pm2 ecosystem config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "pm2/ecosystem.config.js"
          target: "/opt/tokki/backend/"
          strip_components: 1
          overwrite: true

      # ==========================================
      # 5. 서버에서 배포 실행 (SSH)
      # ==========================================
      - name: Restart backend with pm2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "=== pm2 재시작 ==="
            cd /opt/tokki/backend

            # 이미 pm2에 등록되어 있으면 restart, 없으면 start
            if pm2 describe tokki-backend > /dev/null 2>&1; then
              pm2 restart tokki-backend --update-env
            else
              pm2 start ecosystem.config.js
              pm2 save
            fi

            echo "=== pm2 상태 확인 ==="
            pm2 status

            echo "=== 백엔드 헬스체크 (최대 30초 대기) ==="
            for i in $(seq 1 15); do
              if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/api/auth/me | grep -qE "200|401|403"; then
                echo "✅ 백엔드 정상 응답 (시도 $i/15)"
                break
              fi
              echo "⏳ 백엔드 시작 대기 중... ($i/15)"
              sleep 2
            done

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "=== Nginx 설정 검증 ==="
            sudo nginx -t

            echo "=== Nginx 리로드 ==="
            sudo systemctl reload nginx

            echo "=== Nginx 상태 확인 ==="
            sudo systemctl status nginx --no-pager

      # ==========================================
      # 6. 배포 최종 검증
      # ==========================================
      - name: Final deployment verification
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "=============================="
            echo "  🚀 배포 최종 검증 결과"
            echo "=============================="

            echo ""
            echo "[1] pm2 프로세스 상태"
            pm2 list

            echo ""
            echo "[2] Nginx 상태"
            sudo systemctl is-active nginx

            echo ""
            echo "[3] 프론트엔드 파일 확인"
            ls -lh /opt/tokki/frontend/dist/index.html

            echo ""
            echo "[4] 백엔드 JAR 확인"
            ls -lh /opt/tokki/backend/app.jar

            echo ""
            echo "=============================="
            echo "  ✅ 배포 완료!"
            echo "=============================="
